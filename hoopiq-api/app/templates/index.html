<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoopIQ — Live Basketball Analytics</title>

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-border: rgba(0,255,136,0.2);
            --bg: #050a07;
            --bg-card: #090f0b;
            --bg-card2: #0d1510;
            --text: #e8f5ed;
            --text-dim: #5a7a63;
            --mono: 'IBM Plex Mono', monospace;
            --red: #ff4466;
            --orange: #ff8c00;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width:1500px;
            margin:0 auto;
            padding:28px 24px;
        }

        /* Layout */
        .section-label {
            font-size:0.65em;
            color:var(--text-dim);
            letter-spacing:0.12em;
            text-transform:uppercase;
            margin-bottom:10px;
        }

        /* Stats grid */
        .row1 {
            display:grid;
            grid-template-columns:repeat(6,1fr);
            gap:10px;
            margin-bottom:10px;
        }

        .row3 {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin-bottom:16px;
        }

        /* Stream layout (FIXED) */
        .bottom-grid {
            display:grid;
            grid-template-columns:1fr;
            gap:16px;
            margin-bottom:16px;
        }

        /* Charts */
        .charts-row {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
            margin-bottom:20px;
        }

        /* Responsive */
        @media (max-width:900px) {
            .charts-row { grid-template-columns:1fr; }
            .row1 { grid-template-columns:repeat(3,1fr); }
        }

        @media (max-width:600px) {
            .row1 { grid-template-columns:repeat(2,1fr); }
        }

    </style>
</head>

<body>

<!-- Auth Modal -->
{% include 'modal.html' %}

<div class="container">

    <!-- Header -->
    {% include 'header.html' %}

    <!-- Shot Table -->
    {% include 'shot_table.html' %}

    <!-- Shot Stats -->
    {% include 'primary_stats.html' %}

    <!-- Advanced -->
    {% include 'advanced_stats.html' %}

    <!-- Live Feed -->
    {% include 'streams.html' %}

    <!-- Charts -->
    {% include 'charts_row.html' %}

    <!-- Footer -->
    {% include 'footer.html' %}

</div>

<!-- Scripts -->
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/stats.js') }}"></script>
<script src="{{ url_for('static', filename='js/timers.js') }}"></script>
<script src="{{ url_for('static', filename='js/shot_chart.js') }}"></script>
<script src="{{ url_for('static', filename='js/arc_chart.js') }}"></script>

<script>
const MEDIAMTX = 'https://hoopiq.tail6a4dd0.ts.net';

async function startWebRTC(videoId, placeholderId, errorId, streamPath) {
    const video = document.getElementById(videoId);
    const placeholder = document.getElementById(placeholderId);
    const error = document.getElementById(errorId);

    if (!video) return;

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    pc.addTransceiver('video', { direction: 'recvonly' });

    pc.ontrack = evt => {
        video.srcObject = evt.streams[0];
        video.play().catch(()=>{});
        video.classList.add('loaded');
        placeholder?.classList.add('hidden');
        if (error) error.style.display = 'none';
    };

    try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const resp = await fetch(`${MEDIAMTX}/${streamPath}/whep`, {
            method:'POST',
            headers:{'Content-Type':'application/sdp'},
            body:pc.localDescription.sdp
        });

        await pc.setRemoteDescription({
            type:'answer',
            sdp:await resp.text()
        });

    } catch(e) {
        if (error) error.style.display = 'block';
    }
}
</script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
